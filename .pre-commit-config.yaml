repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        name: ruff-isort (auto-fix)
        args: [--select, I, --fix]
      - id: ruff
        name: ruff-lint (auto-fix)
        args: [--fix]

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
