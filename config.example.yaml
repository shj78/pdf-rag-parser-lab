project:
  name: pdf-rag-parser-lab
  stage: runnable-mvp
  notes:
    - "Parser comparison and retrieval evaluation are runnable from the CLI."
    - "Large PDFs and generated artifacts are intentionally excluded from git."

inputs:
  document_dir: data/sample_pdfs
  file_glob: "*.pdf"
  query_set_path: data/eval/query_set.jsonl
  relevance_labels_path: data/eval/relevance_labels.jsonl

parser:
  name: pdfplumber
  compare_against:
    - pdfplumber
    - pymupdf
    - opendataloader
  options:
    parse_tables: true
    preserve_layout: true

chunker:
  name: fixed_size
  options:
    target_chunk_size: 800
    overlap: 120
    prepend_page_text_to_tables: true
    table_context_strategy: calendar_month

retrieval:
  embedding_provider: hashing
  embedding_model: hashing-token-v1
  index_backend: lexical_in_memory
  top_k: 10

reranker:
  enabled: false
  adapter: existing_reranker_bridge
  mode: python_module
  entrypoint: ""

evaluation:
  metric: ndcg
  k_values: [5, 10]
  label_source: manual

output:
  run_dir: artifacts/parser-comparison-runs/example-run
  save_parsed_documents: true
  save_chunks: true
  save_rankings: true
