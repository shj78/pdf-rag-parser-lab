experiment:
  run_name: 2026-youth-allowance-pages1-3-mineru-lexical-table-context

inputs:
  parsed_documents_dir: ../../artifacts/parser-lab-ui-runs/mineru-pages1-3-20260604-approved/parsed_documents/mineru
  query_set_path: ../../data/eval/2026_youth_allowance_pages1_3_queries.jsonl
  relevance_labels_path: ../../data/eval/2026_youth_allowance_pages1_3_relevance.jsonl

chunker:
  name: fixed_size
  options:
    target_chunk_size: 800
    overlap: 120
    prepend_page_text_to_tables: true
    table_context_strategy: calendar_month

retrieval:
  index_backend: lexical_in_memory
  top_k: 5
  filters:
    chunk_type: table

evaluation:
  metric: ndcg
  k_values: [1, 3, 5]

output:
  run_dir: ../../artifacts/retrieval-eval-runs/2026-youth-allowance-pages1-3-mineru-lexical-table-context
  save_chunks: true
  save_rankings: true
